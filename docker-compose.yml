version: "3.8"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: memory_service
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory"]
      interval: 5s
      timeout: 3s
      retries: 5

  memory-service:
    build: .
    ports:
      - "8081:8081"
    environment:
      - KV_NODE_URLS=http://host.docker.internal:8000,http://host.docker.internal:8001,http://host.docker.internal:8002
      - SESSION_TTL_HOURS=24
      - LOG_LEVEL=INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
